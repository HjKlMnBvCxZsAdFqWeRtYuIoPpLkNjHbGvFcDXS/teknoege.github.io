<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | DISCORD USERNAME GENERATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* HATA BURADAYDI, DÜZELTİLDİ: */
            --bg-color: #050505;
            --panel-bg: rgba(22, 23, 27, 0.90); 
            --discord-blue: #5865F2;
            --discord-pink: #EB459E;
            --discord-green: #57F287;
            --hit-color: #00ff41;
            --miss-color: #ff003c;
            --warn-color: #FEE75C;
            --text-main: #e0e0e0;
            --font-mono: 'Share Tech Mono', monospace;
            --font-ui: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hidden { display: none !important; }

        /* --- GLOBAL MATRIX BACKGROUND --- */
        #matrixCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; opacity: 0.5; 
        }

        /* CRT Scanline Effect */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 3px;
            z-index: -1; pointer-events: none;
        }

        /* --- LOGIN EKRANI --- */
        #authScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4); 
            z-index: 100;
        }

        /* Ana Taşıyıcı */
        .wrapper {
            width: 95%; max-width: 1400px;
            display: grid; grid-template-columns: 350px minmax(0, 1fr);
            gap: 20px; 
            height: 85vh; 
            min-height: 600px;
            animation: bootUp 0.8s ease-out forwards;
        }

        /* TEMEL KUTU TASARIMI (Daha Koyu) */
        .card-box {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* MUTLAK POZİSYON İÇ PANEL */
        .absolute-inner {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            padding: 25px;
        }

        /* Başlıklar */
        .header {
            text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 15px; margin-bottom: 15px; flex-shrink: 0;
        }

        .header h1 {
            font-size: 2.2rem; color: #fff;
            text-shadow: 0 0 10px rgba(88, 101, 242, 0.3); letter-spacing: 2px;
        }

        /* --- RGB YAZI ANİMASYONU --- */
        .rgb-text {
            font-family: var(--font-mono); 
            font-size: 0.85rem; 
            letter-spacing: 2px; 
            font-weight: bold;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: rgbFlow 2.5s linear infinite;
        }

        @keyframes rgbFlow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Kaydırılabilir Ayarlar Kısmı */
        .scroll-controls {
            flex: 1; min-height: 0; 
            overflow-y: auto; padding-right: 5px; 
            display: flex; flex-direction: column; gap: 15px;
        }

        .control-group { display: flex; flex-direction: column; gap: 6px; }

        label {
            font-size: 0.85rem; color: #8b949e; text-transform: uppercase;
            letter-spacing: 1px; font-family: var(--font-mono); display: flex; justify-content: space-between;
        }

        select, input {
            background: #1a1b1e; border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d5db; padding: 12px; border-radius: 4px; font-family: var(--font-mono);
            font-size: 0.95rem; outline: none; transition: all 0.3s; width: 100%;
        }

        select:focus, input:focus { border-color: rgba(88, 101, 242, 0.5); box-shadow: 0 0 10px rgba(88, 101, 242, 0.1); }

        /* Şifre Alanı Tasarımı */
        .password-wrapper {
            display: flex;
            align-items: center;
            background: #1a1b1e;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 0 12px;
            transition: all 0.3s;
            width: 100%;
        }

        .password-wrapper:focus-within {
            border-color: rgba(88, 101, 242, 0.5);
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.1);
        }

        .password-wrapper input {
            background: transparent;
            border: none;
            padding: 12px 0;
            color: #d1d5db;
            flex: 1; 
            outline: none;
            box-shadow: none;
        }

        .password-wrapper input:focus { border: none; box-shadow: none; }

        /* Sabit Alt Kontrol Paneli */
        .bottom-controls {
            flex-shrink: 0;
            margin-top: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* Ana Buton Stilleri */
        .btn {
            padding: 15px; border: none; border-radius: 4px; font-family: var(--font-ui);
            font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: all 0.2s; width: 100%;
        }

        .btn-primary { background: rgba(88, 101, 242, 0.1); color: #e0e0e0; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary:hover { border-color: #fff; color: #fff; background: rgba(255, 255, 255, 0.05); }

        .btn-action-start { background: rgba(88, 101, 242, 0.1); color: #5865F2; border: 1px solid rgba(88, 101, 242, 0.4); }
        .btn-action-start:hover { background: rgba(88, 101, 242, 0.8); color: #fff; box-shadow: 0 0 15px rgba(88, 101, 242, 0.3); }

        .btn-danger { background: rgba(237, 66, 69, 0.1); color: var(--miss-color); border: 1px solid rgba(237, 66, 69, 0.4); }
        .btn-danger:hover { background: rgba(237, 66, 69, 0.2); box-shadow: 0 0 15px rgba(255, 0, 60, 0.2); }

        .btn-secondary { background: transparent; color: #8b949e; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { border-color: #fff; color: #fff; }

        /* İmza Kısmı */
        .sys-info {
            font-family: var(--font-mono); font-size: 0.8rem; color: #666; 
            text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .sys-info .signature { color: #fff; text-shadow: 0 0 8px rgba(88, 101, 242, 0.4); margin-top: 5px; }
        .sys-info a { color: var(--discord-blue); text-decoration: none; transition: 0.2s; font-weight: bold; }
        .sys-info a:hover { color: #fff; text-shadow: 0 0 10px var(--discord-blue); }

        /* SAĞ PANEL SİSTEMİ */
        .main-panel { display: flex; flex-direction: column; gap: 20px; height: 100%; position: relative; }
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex-shrink: 0; }

        .stat-box { padding: 15px; text-align: center; position: relative; }
        .stat-box::after { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: #5865F2; opacity: 0.4; }
        .stat-box.hit::after { background: var(--hit-color); opacity: 0.6; }
        .stat-box.miss::after { background: var(--miss-color); opacity: 0.5; }
        .stat-box.cpm::after { background: #FEE75C; opacity: 0.5; }

        .stat-label { font-family: var(--font-mono); font-size: 0.75rem; color: #8b949e; }
        .stat-value { font-size: 2.2rem; font-weight: 700; color: #e5e7eb; font-family: var(--font-mono); margin-top: 5px; }
        .stat-box.hit .stat-value { color: var(--hit-color); text-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }

        .logs-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex: 1; min-height: 0; }

        .log-header {
            background: rgba(18, 19, 23, 0.9); padding: 8px 15px; font-family: var(--font-mono);
            font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid; flex-shrink: 0;
        }
        .log-header.hits { color: var(--hit-color); border-bottom-color: rgba(0, 255, 65, 0.1); }
        .log-header.misses { color: rgba(237, 66, 69, 0.8); border-bottom-color: rgba(237, 66, 69, 0.1); }

        .log-body {
            padding: 15px; flex: 1; min-height: 0; overflow-y: auto; 
            font-family: var(--font-mono); font-size: 0.9rem; display: flex; flex-direction: column; gap: 4px;
        }

        .log-item { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.01); padding-bottom: 3px; animation: insertItem 0.2s ease-out forwards;}
        .log-item.hit { color: #d1fae5; }
        .log-item.hit .prefix { color: var(--hit-color); }
        .log-item.miss { color: #8b949e; }
        .log-item.miss .prefix { color: rgba(237, 66, 69, 0.7); }
        .log-item.sys-error { color: var(--warn-color); font-style: italic; opacity: 0.8; }
        .log-item.sys-error .prefix { color: var(--warn-color); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(88, 101, 242, 0.3); border-radius: 5px; }

        @keyframes bootUp { 0% { opacity: 0; filter: blur(4px); transform: scale(0.98); } 100% { opacity: 1; filter: blur(0); transform: scale(1); } }
        @keyframes insertItem { from { opacity: 0; transform: translateX(-3px); } to { opacity: 1; transform: translateX(0); } }
        .blink { color: #fff; animation: blinker 0.8s steps(2, start) infinite; }
        @keyframes blinker { to { visibility: hidden; } }

    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <div class="scanlines"></div>

    <div id="authScreen">
        <div class="card-box" style="width: 380px; height: 460px;">
            <div class="absolute-inner">
                <div class="header" style="border-bottom: none;">
                    <h1>NEXUS</h1>
                    <span style="color:#FEE75C;">SYSTEM IDENTIFICATION</span>
                </div>
                
                <div class="scroll-controls" style="overflow: visible;">
                    <div class="control-group">
                        <label>Username</label>
                        <input type="text" id="authUsername" placeholder="Enter username..." autocomplete="off">
                    </div>
                    
                    <div class="control-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="authPassword" placeholder="Enter password...">
                        </div>
                    </div>
                    
                    <div id="authMessage" style="color: var(--miss-color); text-align: center; font-family: var(--font-mono); font-size: 0.85rem; height: 15px; margin-top: 5px;"></div>
                </div>

                <div class="bottom-controls" style="margin-top: auto;">
                    <button class="btn btn-primary" onclick="loginUser()">LOGIN</button>
                    <button class="btn btn-secondary" onclick="registerUser()">CREATE ACCOUNT</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="wrapper hidden">
        <div class="card-box">
            <div class="absolute-inner">
                
                <div class="header">
                    <h1>NEXUS</h1>
                    <div>
                        <span id="typewriterText" class="rgb-text"></span><span class="blink">_</span>
                    </div>
                </div>

                <div class="scroll-controls">
                    <div class="control-group">
                        <label>Target Pattern Module</label>
                        <select id="modeSelect">
                            <option value="4_alpha">4 Letters (Alpha)</option>
                            <option value="4_alnum">4 Letters + Numbers (Beta)</option>
                            <option value="4_sym">4 Letters + Num + Symbols (._)</option>
                            <option value="5_alpha">5 Letters (Gamma)</option>
                            <option value="5_alnum">5 Letters + Numbers (Delta)</option>
                            <option value="5_sym">5 Letters + Num + Symbols (._)</option>
                            <option value="word">Dictionary Words</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Proxy Protocol</label>
                        <select id="proxySelect">
                            <option>SOCKS5 (Auto-Rotate Botnet)</option>
                            <option>SOCKS4 (Datacenter Nodes)</option>
                            <option>HTTP/S (Residential Proxies)</option>
                            <option>API-Based IP Rotation</option>
                            <option style="color:var(--miss-color)">Localhost (Direct Connection)</option>
                        </select>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="control-group">
                            <label>Threads</label>
                            <input type="number" id="threadsInput" value="150" min="1" max="500">
                        </div>
                        <div class="control-group">
                            <label>Base Speed (ms)</label>
                            <input type="number" id="speedInput" value="15" min="1" max="1000">
                        </div>
                    </div>
                </div>

                <div class="bottom-controls">
                    <button id="btnAction" class="btn btn-action-start" onclick="toggleScanner()">INITIATE SEQUENCE</button>

                    <div class="sys-info">
                        <div>AUTHORIZED USER: <span id="authUserDisplay" style="color:#EB459E">GUEST</span></div>
                        <div>SYSTEM STATUS: <span id="sysStatus" style="color:#6b7280">STANDBY</span></div>
                        <div class="signature">
                            CREATOR: <a href="https://teknoege.xyz" target="_blank">teknoege.xyz</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="main-panel">
            <div class="stats-container">
                <div class="card-box" style="height: auto;">
                    <div class="stat-box">
                        <div class="stat-label">TOTAL INJECTED</div>
                        <div class="stat-value" id="valTotal">0</div>
                    </div>
                </div>
                <div class="card-box" style="height: auto;">
                    <div class="stat-box hit">
                        <div class="stat-label">CAPTURED (HITS)</div>
                        <div class="stat-value" id="valHits">0</div>
                    </div>
                </div>
                <div class="card-box" style="height: auto;">
                    <div class="stat-box miss">
                        <div class="stat-label">UNAVAILABLE</div>
                        <div class="stat-value" id="valMiss">0</div>
                    </div>
                </div>
                <div class="card-box" style="height: auto;">
                    <div class="stat-box cpm">
                        <div class="stat-label">SPEED (CPM)</div>
                        <div class="stat-value" id="valCPM">0</div>
                    </div>
                </div>
            </div>

            <div class="logs-container">
                <div class="card-box">
                    <div class="absolute-inner" style="padding: 0;">
                        <div class="log-header hits">
                            <span>> SECURE_PAYLOAD.HITS</span>
                            <span id="hitCounterLabel">0</span>
                        </div>
                        <div class="log-body" id="hitsLog"></div>
                    </div>
                </div>
                
                <div class="card-box">
                    <div class="absolute-inner" style="padding: 0;">
                        <div class="log-header misses">
                            <span>> DISCARDED_DATA.LOG</span>
                        </div>
                        <div class="log-body" id="missesLog"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* --- AUTHENTICATION SYSTEM --- */
        function getUsersDB() {
            return JSON.parse(localStorage.getItem('nexus_accounts') || '{}');
        }

        function saveUsersDB(db) {
            localStorage.setItem('nexus_accounts', JSON.stringify(db));
        }

        function showAuthMsg(msg, isSuccess = false) {
            const msgEl = document.getElementById('authMessage');
            msgEl.innerText = msg;
            msgEl.style.color = isSuccess ? "var(--hit-color)" : "var(--miss-color)";
        }

        function registerUser() {
            const user = document.getElementById('authUsername').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            
            if(!user || !pass) return showAuthMsg("Username and password cannot be empty.");
            if(user.length < 3) return showAuthMsg("Username must be at least 3 characters.");
            
            const db = getUsersDB();
            if(db[user]) return showAuthMsg("Username already registered.");

            db[user] = pass; 
            saveUsersDB(db);
            showAuthMsg("Registration successful. Ready to login.", true);
        }

        function loginUser() {
            const user = document.getElementById('authUsername').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            
            if(!user || !pass) return showAuthMsg("Credentials required.");

            const db = getUsersDB();
            
            if(db[user] && db[user] === pass) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('authUserDisplay').innerText = user;
                
                // Başarılı girişten sonra daktilo animasyonunu başlat
                setTimeout(typeWriter, 500); 
            } else {
                showAuthMsg("ACCESS DENIED: Invalid credentials.");
            }
        }

        document.getElementById("authPassword").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                loginUser();
            }
        });

        /* --- DÖNGÜLÜ DAKTİLO EFEKTİ --- */
        const textToType = "DISCORD USERNAME GENERATOR";
        let typeIndex = 0;
        let isDeleting = false;

        function typeWriter() {
            const el = document.getElementById('typewriterText');
            
            if (!isDeleting && typeIndex <= textToType.length) {
                // Yazma Aşaması
                el.innerText = textToType.substring(0, typeIndex);
                typeIndex++;
                setTimeout(typeWriter, 100);
            } 
            else if (isDeleting && typeIndex >= 0) {
                // Silme Aşaması (Daha hızlı silinir)
                el.innerText = textToType.substring(0, typeIndex);
                typeIndex--;
                setTimeout(typeWriter, 40); 
            } 
            else {
                // Bekleme ve Durum Değiştirme (Tamamen yazıldıysa veya silindiyse)
                isDeleting = !isDeleting;
                setTimeout(typeWriter, 1500); // 1.5 saniye bekle
            }
        }

        /* --- SADECE YEŞİL MATRIX BACKROUND --- */
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const matrixChars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_.';
        const matrixColors = ['#0f0', '#00ff41', '#00cc00', '#009900']; 
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for(let i = 0; i < drops.length; i++) {
                const text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
                
                if (Math.random() > 0.98) {
                    ctx.fillStyle = matrixColors[Math.floor(Math.random() * matrixColors.length)];
                    ctx.globalAlpha = 0.4;
                } else {
                    ctx.fillStyle = '#00ff41'; 
                    ctx.globalAlpha = 1.0;
                }
                
                ctx.font = fontSize + 'px Share Tech Mono';
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        /* --- DYNAMIC & REALISTIC CHECKER LOGIC --- */
        let isRunning = false;
        let isPaused = false;
        let scanTimeout;
        let cpmInterval;
        
        let stats = { total: 0, hits: 0, miss: 0 };
        let checksThisSecond = 0;

        const alphabet = "abcdefghijklmnopqrstuvwxyz";
        const numbers = "0123456789";
        const symbols = "_.";
        const words = ["shadow", "cyber", "neon", "ghost", "void", "null", "root", "admin", "zero", "byte", "flux", "nova", "dark", "haze", "sync", "proxy", "hack", "system"];

        const elTotal = document.getElementById('valTotal');
        const elHits = document.getElementById('valHits');
        const elMiss = document.getElementById('valMiss');
        const elCPM = document.getElementById('valCPM');
        const logHits = document.getElementById('hitsLog');
        const logMisses = document.getElementById('missesLog');
        const hitCounterLabel = document.getElementById('hitCounterLabel');

        function generateName(mode) {
            if (mode === 'word') {
                return words[Math.floor(Math.random() * words.length)] + (Math.random() > 0.6 ? Math.floor(Math.random() * 99) : '');
            }
            let length = mode.startsWith('4') ? 4 : 5;
            let charset = alphabet;
            if (mode.includes('alnum')) charset += numbers;
            if (mode.includes('sym')) charset += numbers + symbols;

            let result = '';
            for (let i = 0; i < length; i++) {
                result += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            return result;
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function createLogEntry(name, isHit, isSysError = false) {
            const div = document.createElement('div');
            if (isSysError) {
                div.className = 'log-item sys-error';
                div.innerHTML = `<span class="prefix">[!]</span> <span>${name}</span>`;
            } else {
                div.className = `log-item ${isHit ? 'hit' : 'miss'}`;
                const prefix = isHit ? '[+]' : '[-]';
                const status = isHit ? 'AVAILABLE' : 'TAKEN';
                div.innerHTML = `<span class="prefix">${prefix} ${name}</span> <span>${status}</span>`;
            }
            return div;
        }

        function performCheck() {
            if (!isRunning || isPaused) return;

            if (Math.random() < 0.01) {
                triggerProxyRotation();
                return;
            }

            const mode = document.getElementById('modeSelect').value;
            const name = generateName(mode);
            
            let hitChance = 0; 
            if (mode === '4_alpha') hitChance = 0.01;      
            else if (mode === '4_alnum') hitChance = 0.02; 
            else if (mode === '4_sym') hitChance = 0.04;   
            else if (mode === '5_alpha') hitChance = 0.03; 
            else if (mode === '5_alnum') hitChance = 0.05; 
            else if (mode === '5_sym') hitChance = 0.08;   
            else if (mode === 'word') hitChance = 0.1;     

            const isHit = Math.random() < hitChance;

            stats.total++;
            checksThisSecond++;

            if (isHit) {
                stats.hits++;
                elHits.innerText = formatNumber(stats.hits);
                hitCounterLabel.innerText = formatNumber(stats.hits);
                logHits.prepend(createLogEntry(name, true));
                if (logHits.children.length > 80) logHits.lastChild.remove();
            } else {
                stats.miss++;
                elMiss.innerText = formatNumber(stats.miss);
                logMisses.prepend(createLogEntry(name, false));
                if (logMisses.children.length > 40) logMisses.lastChild.remove();
            }

            if (stats.total % 3 === 0) elTotal.innerText = formatNumber(stats.total);

            scheduleNextCheck();
        }

        function triggerProxyRotation() {
            isPaused = true;
            const sysStatus = document.getElementById('sysStatus');
            sysStatus.innerText = "ROTATING PROXY NODE...";
            sysStatus.style.color = "var(--warn-color)";
            
            logMisses.prepend(createLogEntry("CONNECTION TIMEOUT - ROTATING NODE", false, true));
            if (logMisses.children.length > 40) logMisses.lastChild.remove();

            setTimeout(() => {
                isPaused = false;
                if(isRunning) {
                    sysStatus.innerText = "DATA INJECTION ACTIVE";
                    sysStatus.style.color = "#57F287";
                    scheduleNextCheck();
                }
            }, Math.floor(Math.random() * 3000) + 2000);
        }

        function scheduleNextCheck() {
            if (!isRunning || isPaused) return;

            let baseSpeed = parseInt(document.getElementById('speedInput').value) || 15;
            let jitter = (Math.random() * baseSpeed * 0.6) - (baseSpeed * 0.3);
            let finalSpeed = Math.max(1, baseSpeed + jitter);

            if (Math.random() < 0.05) finalSpeed += Math.floor(Math.random() * 300) + 100;

            scanTimeout = setTimeout(performCheck, finalSpeed);
        }

        function calculateCPM() {
            if (!isRunning) return;
            elCPM.innerText = formatNumber(checksThisSecond * 60);
            checksThisSecond = 0;
        }

        function toggleScanner() {
            if (!isRunning) startScanner();
            else stopScanner();
        }

        function startScanner() {
            const btn = document.getElementById('btnAction');
            btn.innerText = "ABORT SEQUENCE";
            btn.className = "btn btn-danger"; 

            document.querySelectorAll('.scroll-controls select, .scroll-controls input').forEach(el => el.disabled = true);
            
            const status = document.getElementById('sysStatus');
            status.innerText = "DATA INJECTION ACTIVE";
            status.style.color = "#57F287";

            isRunning = true;
            isPaused = false;
            checksThisSecond = 0;
            
            scheduleNextCheck();
            cpmInterval = setInterval(calculateCPM, 1000);
        }

        function stopScanner() {
            isRunning = false;
            clearTimeout(scanTimeout);
            clearInterval(cpmInterval);
            checksThisSecond = 0;
            elCPM.innerText = "0";

            const btn = document.getElementById('btnAction');
            btn.innerText = "INITIATE SEQUENCE";
            btn.className = "btn btn-action-start"; 

            document.querySelectorAll('.scroll-controls select, .scroll-controls input').forEach(el => el.disabled = false);

            const status = document.getElementById('sysStatus');
            status.innerText = "STANDBY";
            status.style.color = "#6b7280";
        }
    </script>
</body>
</html>
